name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Node 22 — the smoke test uses `--experimental-strip-types` (Node 22.6+).
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Content smoke test
        run: npm run smoke

      - name: Production build
        run: npm run build
