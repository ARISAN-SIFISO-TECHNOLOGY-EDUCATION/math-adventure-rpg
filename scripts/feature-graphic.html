<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1024px; height: 500px; overflow: hidden; }
  body {
    position: relative;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(125deg, #0f766e 0%, #4338ca 55%, #86198f 100%);
    color: #fff;
  }
  /* soft light blooms for depth */
  .bloom { position: absolute; border-radius: 50%; filter: blur(2px); opacity: .25; }
  .b1 { width: 360px; height: 360px; right: -80px; top: -120px; background: #5EEAD4; }
  .b2 { width: 300px; height: 300px; right: 180px; bottom: -160px; background: #F0ABFC; opacity:.2; }

  .wrap { position: absolute; inset: 0; display: flex; align-items: center; padding: 0 64px; }

  /* ---- left: brand ---- */
  .left { width: 60%; z-index: 2; }
  .kicker {
    font-weight: 700; font-size: 18px; letter-spacing: 3px; text-transform: uppercase;
    color: #C7D2FE; margin-bottom: 14px;
  }
  h1 {
    font-family: 'Nunito', 'Segoe UI', sans-serif; font-weight: 900;
    font-size: 76px; line-height: .98; letter-spacing: -1.5px;
    text-shadow: 0 4px 18px rgba(0,0,0,.28);
  }
  h1 .rpg { color: #5EEAD4; }
  .tag { font-size: 23px; font-weight: 600; color: #E9D5FF; margin-top: 18px; max-width: 480px; line-height: 1.35; }
  .pills { display: flex; gap: 12px; margin-top: 28px; }
  .pill {
    font-weight: 700; font-size: 17px; padding: 10px 18px; border-radius: 999px;
    background: rgba(255,255,255,.16); border: 1px solid rgba(255,255,255,.22);
    backdrop-filter: blur(2px); white-space: nowrap;
  }
  .pill.free { background: #5EEAD4; color: #0f2e2b; border-color: transparent; }

  /* ---- right: playful cluster ---- */
  .right { position: absolute; right: 70px; top: 0; bottom: 0; width: 360px; z-index: 1; }
  .monster { position: absolute; right: 36px; top: 150px; font-size: 210px; filter: drop-shadow(0 12px 24px rgba(0,0,0,.35)); }
  .sym {
    position: absolute; font-family: 'Nunito', sans-serif; font-weight: 900;
    color: #fff; opacity: .92; text-shadow: 0 3px 10px rgba(0,0,0,.25);
  }
  .chip {
    position: absolute; display: grid; place-items: center;
    width: 76px; height: 76px; border-radius: 20px; font-size: 34px; font-weight: 900;
    font-family: 'Nunito', sans-serif; transform: rotate(-8deg);
    box-shadow: 0 10px 22px rgba(0,0,0,.28);
  }
  .c1 { right: 280px; top: 70px;  background: #FCD34D; color: #2e2410; }
  .c2 { right: 30px;  top: 50px;  background: #5EEAD4; color: #0f2e2b; transform: rotate(7deg); }
  .c3 { right: 250px; bottom: 70px; background: #F0ABFC; color: #2a1335; transform: rotate(6deg); }
  .s1 { right: 200px; top: 200px; font-size: 60px; color:#FCD34D; }
  .s2 { right: 320px; top: 280px; font-size: 46px; }
  .s3 { right: 130px; bottom: 120px; font-size: 52px; color:#5EEAD4; }
</style>
</head>
<body>
  <div class="bloom b1"></div>
  <div class="bloom b2"></div>

  <div class="wrap">
    <div class="left">
      <div class="kicker">Ages 3–17 · 100% Offline · No Ads</div>
      <h1>Math Adventure <span class="rpg">RPG</span></h1>
      <div class="tag">Play, learn &amp; master maths — from first counting to exam prep.</div>
      <div class="pills">
        <span class="pill">🎮 Play 3–12</span>
        <span class="pill">🎓 Master 13–17</span>
        <span class="pill free">✨ Free forever</span>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="chip c1">7</div>
    <div class="chip c2">+</div>
    <div class="chip c3">×</div>
    <div class="sym s1">÷</div>
    <div class="sym s2">=</div>
    <div class="sym s3">%</div>
    <div class="monster">👾</div>
  </div>
</body>
</html>
